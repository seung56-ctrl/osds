<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>눈빛으로 팀원 모집</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Gaegu:wght@400;700&display=swap');

  :root {
    --stage1-bg: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
    --stage2-bg: linear-gradient(180deg, #0a1a0a 0%, #1a3020 50%, #0a1a0a 100%);
    --stage3-bg: linear-gradient(180deg, #2e1a0a 0%, #4e2d1b 50%, #2e1a0a 100%);
    --stage4-bg: linear-gradient(180deg, #0a0a2e 0%, #1b1b4e 50%, #0a0a2e 100%);
    --accent: #f0c040;
    --glow: #ffe066;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: #0a0a0a;
    overflow: hidden;
    user-select: none;
    cursor: default;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ─── TITLE ─── */
  #title-screen {
    background: radial-gradient(ellipse at center, #1a0535 0%, #050010 100%);
  }
  .title-particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #f0c040;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    20% { opacity: 0.8; }
    80% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100vh) scale(0.5); }
  }

  .title-logo {
    text-align: center;
    z-index: 1;
    animation: titleFadeIn 1.5s ease forwards;
  }
  @keyframes titleFadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .title-logo h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    color: #f0c040;
    text-shadow: 0 0 40px #f0c04066, 0 0 80px #f0c04033;
    letter-spacing: 0.1em;
    line-height: 1.2;
  }
  .title-logo .subtitle {
    font-family: 'Gaegu', cursive;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: #c0a0e0;
    margin-top: 0.8rem;
    letter-spacing: 0.2em;
  }
  .title-logo .desc {
    font-size: clamp(0.75rem, 1.8vw, 0.95rem);
    color: #8888aa;
    margin-top: 1.5rem;
    line-height: 1.8;
    text-align: center;
  }

  .start-btn {
    margin-top: 3rem;
    padding: 1rem 3.5rem;
    background: transparent;
    border: 2px solid #f0c040;
    color: #f0c040;
    font-family: 'Noto Serif KR', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    z-index: 1;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #f0c040;
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }
  .start-btn:hover::before { transform: translateX(0); }
  .start-btn:hover { color: #1a0535; }
  .start-btn .pulse-ring {
    position: absolute;
    inset: -4px;
    border: 1px solid #f0c04066;
    animation: pulseRing 2s ease-in-out infinite;
  }
  @keyframes pulseRing {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 0; transform: scale(1.05); }
  }

  /* ─── GAME SCREEN ─── */
  #game-screen {
    overflow: hidden;
  }

  .stage-bg {
    position: absolute;
    inset: 0;
    transition: background 1s ease;
  }

  /* Stage backgrounds */
  .stage-bg.s1 {
    background: linear-gradient(180deg, #0d0520 0%, #1a0a38 60%, #0d0820 100%);
  }
  .stage-bg.s1::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 80px,
      rgba(80,40,120,0.08) 80px,
      rgba(80,40,120,0.08) 82px
    ),
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 120px,
      rgba(80,40,120,0.06) 120px,
      rgba(80,40,120,0.06) 122px
    );
  }

  .stage-bg.s2 {
    background: linear-gradient(180deg, #051205 0%, #0a2010 60%, #051205 100%);
  }
  .stage-bg.s2::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(40,100,40,0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(20,80,20,0.1) 0%, transparent 40%);
  }

  .stage-bg.s3 {
    background: linear-gradient(180deg, #120803 0%, #2a1205 60%, #120803 100%);
  }
  .stage-bg.s3::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(200,80,20,0.12) 0%, transparent 50%);
  }

  .stage-bg.s4 {
    background: linear-gradient(180deg, #030318 0%, #060630 60%, #030318 100%);
  }
  .stage-bg.s4::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 20% 50%, rgba(60,0,120,0.2) 0%, transparent 40%),
                      radial-gradient(circle at 80% 50%, rgba(0,60,120,0.2) 0%, transparent 40%),
                      radial-gradient(circle at 50% 80%, rgba(120,0,60,0.15) 0%, transparent 40%);
  }

  /* ─── HUD ─── */
  .hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 100;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  .stage-info {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .stage-label {
    font-family: 'Gaegu', cursive;
    font-size: 0.75rem;
    color: #8888aa;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .stage-name {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 700;
    color: #f0c040;
    text-shadow: 0 0 20px #f0c04066;
  }
  .stage-hint {
    font-size: 0.75rem;
    color: #9999bb;
    margin-top: 0.1rem;
    font-style: italic;
  }

  .team-display {
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }
  .team-slot {
    width: 44px;
    height: 44px;
    border: 1px solid #444466;
    border-radius: 6px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: #555577;
    transition: all 0.5s ease;
    overflow: hidden;
    position: relative;
  }
  .team-slot.filled {
    border-color: #f0c040;
    background: rgba(240,192,64,0.15);
    box-shadow: 0 0 12px #f0c04044, inset 0 0 8px #f0c04022;
  }
  .team-slot .slot-face {
    font-size: 1.4rem;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .team-slot.filled .slot-face {
    opacity: 1;
    transform: scale(1);
  }
  .team-slot .slot-empty {
    font-size: 0.55rem;
    color: #444466;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.3;
    padding: 0.2rem;
  }

  /* ─── FLOOR LINE ─── */
  .floor-line {
    position: absolute;
    bottom: 28%;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0.06) 70%, transparent 100%);
    z-index: 5;
  }

  /* ─── CHARACTERS ─── */
  .char-container {
    position: absolute;
    bottom: 25%;
    left: 0;
    right: 0;
    height: 240px;
    z-index: 10;
  }

  .character {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    animation: walkAcross linear forwards;
    will-change: transform;
  }
  @keyframes walkAcross {
    from { transform: translateX(-160px); }
    to   { transform: translateX(calc(100vw + 160px)); }
  }

  .char-body {
    position: relative;
    width: 64px;
    height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: filter 0.3s ease, transform 0.15s ease;
  }

  .character:hover .char-body {
    transform: translateY(-4px);
  }

  /* NPC body */
  .char-head {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
    transition: box-shadow 0.3s ease;
  }

  .char-torso {
    width: 50px;
    height: 60px;
    border-radius: 8px 8px 4px 4px;
    margin-top: -4px;
    position: relative;
    flex-shrink: 0;
  }

  .char-legs {
    width: 50px;
    height: 30px;
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }

  .char-leg {
    flex: 1;
    border-radius: 3px;
    animation: legWalk 0.5s ease-in-out infinite alternate;
  }
  .char-leg:nth-child(2) {
    animation-direction: alternate-reverse;
  }
  @keyframes legWalk {
    from { transform: skewX(-8deg); }
    to   { transform: skewX(8deg); }
  }

  /* Eyes */
  .char-eyes {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .eye {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #1a1a2e;
    position: relative;
    transition: all 0.3s ease;
  }
  .pupil {
    position: absolute;
    inset: 1px;
    border-radius: 50%;
    background: #333355;
    transition: all 0.3s ease;
  }

  /* ─── TARGET CHARACTER ─── */
  .character.is-target .char-body {
    filter: none;
  }

  /* The GLOW effect on hover */
  .character.is-target:hover .char-body {
    filter: drop-shadow(0 0 8px var(--glow)) drop-shadow(0 0 20px #f0c04088);
  }

  /* Eyes change on target hover */
  .character.is-target:hover .eye {
    background: #f0c040;
    box-shadow: 0 0 8px #f0c040, 0 0 16px #f0c04088;
    width: 8px;
    height: 8px;
  }
  .character.is-target:hover .pupil {
    background: #ffe080;
    box-shadow: 0 0 6px #ffe080;
  }

  /* Subtle ambient glow always on target */
  .character.is-target .char-head {
    box-shadow: 0 0 0 0 transparent;
    animation: targetPulse 2.5s ease-in-out infinite;
  }
  @keyframes targetPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,64,0); }
    50% { box-shadow: 0 0 16px 2px rgba(240,192,64,0.18); }
  }

  /* Wrong click flash */
  .character.wrong-click .char-body {
    animation: wrongFlash 0.4s ease forwards;
  }
  @keyframes wrongFlash {
    0%, 100% { filter: none; }
    50% { filter: brightness(2) sepia(1) hue-rotate(-20deg); }
  }

  /* Caught animation */
  .character.caught {
    animation: none !important;
    pointer-events: none;
  }
  .character.caught .char-body {
    animation: caughtSpin 0.6s ease forwards;
  }
  @keyframes caughtSpin {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.4) rotate(15deg); filter: drop-shadow(0 0 20px #f0c040); }
    100% { transform: scale(0) rotate(30deg); opacity: 0; }
  }

  /* ─── BACKGROUND DECO ─── */
  .bg-deco {
    position: absolute;
    z-index: 2;
    pointer-events: none;
  }

  /* Stage 1: Library shelves */
  .shelf {
    position: absolute;
    height: 60px;
    background: #1a0a30;
    border-bottom: 3px solid #2a1550;
    display: flex;
    align-items: flex-end;
    padding: 0 4px 4px;
    gap: 3px;
  }
  .book {
    width: 12px;
    height: 48px;
    border-radius: 1px 1px 0 0;
  }

  /* ─── MISS EFFECT ─── */
  .miss-text {
    position: fixed;
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #ff4444;
    text-shadow: 0 0 10px #ff4444;
    pointer-events: none;
    z-index: 9999;
    animation: missFly 0.8s ease forwards;
  }
  @keyframes missFly {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -100%) scale(1.3); }
  }

  /* ─── FOUND OVERLAY ─── */
  .found-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(240,192,64,0.25) 0%, rgba(0,0,0,0.85) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .found-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .found-overlay h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #f0c040;
    text-shadow: 0 0 40px #f0c040;
    animation: foundPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes foundPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .found-char-preview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin: 1.5rem auto;
    border: 3px solid #f0c040;
    box-shadow: 0 0 30px #f0c04088;
    animation: rotateBorder 3s linear infinite;
  }
  @keyframes rotateBorder {
    from { box-shadow: 0 0 20px #f0c040, 0 -20px 20px #f0c04066; }
    to   { box-shadow: 0 0 20px #f0c040, 0 20px 20px #f0c04066; }
  }
  .found-member-name {
    font-family: 'Gaegu', cursive;
    font-size: 1.3rem;
    color: #e0d0ff;
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
  }
  .found-member-role {
    font-size: 0.85rem;
    color: #9999bb;
    margin-top: 0.3rem;
  }
  .next-btn {
    margin-top: 2.5rem;
    padding: 0.9rem 3rem;
    background: #f0c040;
    border: none;
    color: #1a0535;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px #f0c04066;
  }
  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px #f0c04099;
  }

  /* ─── ENDING SCREEN ─── */
  #ending-screen {
    background: radial-gradient(ellipse at center, #0d0225 0%, #020010 100%);
    z-index: 200;
  }

  .ending-content {
    text-align: center;
    z-index: 1;
    animation: endingReveal 1.5s ease forwards;
  }
  @keyframes endingReveal {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ending-content h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    color: #f0c040;
    text-shadow: 0 0 40px #f0c040, 0 0 80px #f0c04066;
    line-height: 1.3;
  }
  .ending-content p {
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    color: #9999cc;
    margin-top: 1.2rem;
    line-height: 1.9;
    max-width: 420px;
  }

  .team-final {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin: 2.5rem 0;
    flex-wrap: wrap;
  }
  .team-final-member {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    animation: memberAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .team-final-member:nth-child(1) { animation-delay: 0.2s; }
  .team-final-member:nth-child(2) { animation-delay: 0.4s; }
  .team-final-member:nth-child(3) { animation-delay: 0.6s; }
  .team-final-member:nth-child(4) { animation-delay: 0.8s; }
  @keyframes memberAppear {
    from { opacity: 0; transform: scale(0) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .member-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid #f0c040;
    box-shadow: 0 0 20px #f0c04066;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }
  .member-name-label {
    font-family: 'Gaegu', cursive;
    font-size: 0.85rem;
    color: #c0b0e0;
    letter-spacing: 0.1em;
  }

  .replay-btn {
    margin-top: 1rem;
    padding: 0.85rem 2.5rem;
    background: transparent;
    border: 2px solid #f0c040;
    color: #f0c040;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 4px;
  }
  .replay-btn:hover {
    background: #f0c040;
    color: #0d0225;
  }

  .stars-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle linear infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.9; }
  }

  /* ─── PROGRESS BAR ─── */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 100;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f0c040, #ffe080);
    transition: width 0.5s ease;
    box-shadow: 0 0 8px #f0c04088;
  }

  /* cursor style for game */
  #game-screen { cursor: crosshair; }

  /* ─── INSTRUCTION TOAST ─── */
  .toast {
    position: absolute;
    bottom: 20%;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: rgba(10,5,30,0.9);
    border: 1px solid #f0c04044;
    color: #e0d8f0;
    font-size: 0.8rem;
    padding: 0.6rem 1.5rem;
    border-radius: 20px;
    letter-spacing: 0.1em;
    z-index: 50;
    text-align: center;
    animation: toastFade 4s ease forwards;
  }
  @keyframes toastFade {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- ═══ TITLE SCREEN ═══ -->
<div id="title-screen" class="screen">
  <div class="title-particles" id="particles"></div>
  <div class="title-logo">
    <h1>눈빛으로<br>팀원 모집</h1>
    <p class="subtitle">— Recruit Your Crew —</p>
    <p class="desc">
      군중 속에서 나의 팀원을 찾아라.<br>
      그들은 분명 어딘가에 있다... 눈빛을 보내고 있을 것이다.
    </p>
    <button class="start-btn" id="startBtn">
      <span class="pulse-ring"></span>
      시작하기
    </button>
  </div>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="screen hidden">
  <div class="stage-bg" id="stageBg"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="stage-info">
      <span class="stage-label" id="stageLabel">Stage 1 / 4</span>
      <span class="stage-name" id="stageName">Loading...</span>
      <span class="stage-hint" id="stageHint"></span>
    </div>
    <div class="team-display" id="teamDisplay"></div>
  </div>

  <!-- Floor -->
  <div class="floor-line"></div>

  <!-- Character container -->
  <div class="char-container" id="charContainer"></div>

  <!-- Progress bar -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- ═══ FOUND OVERLAY ═══ -->
<div class="found-overlay" id="foundOverlay">
  <h2 id="foundTitle">팀원 영입!</h2>
  <div class="found-char-preview" id="foundPreview"></div>
  <p class="found-member-name" id="foundName"></p>
  <p class="found-member-role" id="foundRole"></p>
  <button class="next-btn" id="nextBtn">계속하기</button>
</div>

<!-- ═══ ENDING SCREEN ═══ -->
<div id="ending-screen" class="screen hidden">
  <div class="stars-bg" id="endingStars"></div>
  <div class="ending-content">
    <h2>팀 결성 완료!</h2>
    <div class="team-final" id="teamFinal"></div>
    <p>
      당신의 예리한 눈빛이 마침내<br>
      4명의 팀원을 한데 모았습니다.<br>
      이제 우리의 이야기가 시작됩니다.
    </p>
    <button class="replay-btn" id="replayBtn">처음부터 다시</button>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   GAME DATA
───────────────────────────────────────── */
const STAGES = [
  {
    id: 1,
    name: '심야 도서관',
    hint: '책들 사이를 거니는 그들... 한 명이 당신을 기다린다',

      torsoColor: '#4a2870',
      legColor: '#2a1840',
      eyeBase: '#c080ff',
      slotFace: 'A',
      slotColor: '#c080ff',
    },
    npcPalettes: [
      { h: '#5a3a2a', t: '#3a2018', l: '#1a1008', e: '#886644' },
      { h: '#2a3a5a', t: '#182038', l: '#080818', e: '#4466aa' },
      { h: '#3a5a3a', t: '#203820', l: '#101810', e: '#446644' },
      { h: '#5a5a2a', t: '#383818', l: '#181808', e: '#aaaa44' },
      { h: '#5a2a4a', t: '#381828', l: '#180808', e: '#aa4488' },
    ],
  },
  {
    id: 2,
    name: '비밀 정원',
    hint: '이슬 맺힌 새벽, 꽃 사이에 숨어있는 동료를 찾아라',
    bgClass: 's2',
    npcCount: 5,
    target: {
      name: '하준',
      role: '탐색가 / 길잡이 담당',
      icon: 'B',
      headColor: '#2a7a3a',
      torsoColor: '#1a5228',
      legColor: '#0a2810',
      eyeBase: '#60ff80',
      slotFace: 'B',
      slotColor: '#60ff80',
    },
    npcPalettes: [
      { h: '#4a3a1a', t: '#2a2010', l: '#100a04', e: '#886633' },
      { h: '#3a1a1a', t: '#221010', l: '#0e0808', e: '#884433' },
      { h: '#1a2a3a', t: '#101820', l: '#080c10', e: '#336688' },
      { h: '#3a3a1a', t: '#222210', l: '#0e0e08', e: '#777733' },
      { h: '#1a3a3a', t: '#102222', l: '#080e0e', e: '#337777' },
    ],
  },
  {
    id: 3,
    name: '황혼의 시장',
    hint: '노점상들의 소음 속에서 당신만을 찾는 눈빛이 있다',
    bgClass: 's3',
    npcCount: 6,
    target: {
      name: '세나',
      role: '외교관 / 소통 담당',
      icon: 'C',
      headColor: '#c04020',
      torsoColor: '#801c08',
      legColor: '#400e04',
      eyeBase: '#ff8040',
      slotFace: 'C',
      slotColor: '#ff8040',
    },
    npcPalettes: [
      { h: '#4a2a1a', t: '#2a1810', l: '#0e0a06', e: '#885533' },
      { h: '#2a4a1a', t: '#182a10', l: '#0a0e06', e: '#558833' },
      { h: '#1a1a4a', t: '#10102a', l: '#06060e', e: '#333388' },
      { h: '#4a4a1a', t: '#2a2a10', l: '#0e0e06', e: '#888833' },
      { h: '#4a1a4a', t: '#2a102a', l: '#0e060e', e: '#883388' },
      { h: '#1a4a4a', t: '#102a2a', l: '#060e0e', e: '#338888' },
    ],
  },
  {
    id: 4,
    name: '지하 무도회',
    hint: '가면 속의 얼굴들... 진짜 동료는 반드시 당신을 알아본다',
    bgClass: 's4',
    npcCount: 7,
    target: {
      name: '도현',
      role: '행동대장 / 실행 담당',
      icon: 'D',
      headColor: '#204080',
      torsoColor: '#102050',
      legColor: '#081028',
      eyeBase: '#40a0ff',
      slotFace: 'D',
      slotColor: '#40a0ff',
    },
    npcPalettes: [
      { h: '#3a1a4a', t: '#20102a', l: '#0e060e', e: '#7733aa' },
      { h: '#1a3a4a', t: '#10202a', l: '#060e0e', e: '#3377aa' },
      { h: '#4a1a1a', t: '#2a1010', l: '#0e0606', e: '#aa3333' },
      { h: '#1a4a1a', t: '#102a10', l: '#060e06', e: '#33aa33' },
      { h: '#4a3a1a', t: '#2a2010', l: '#0e0e06', e: '#aa7733' },
      { h: '#1a1a4a', t: '#10102a', l: '#06060e', e: '#3333aa' },
      { h: '#3a3a3a', t: '#202020', l: '#0e0e0e', e: '#777777' },
    ],
  },
];

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let currentStage = 0;
let collectedTeam = [];
let spawnInterval = null;
let activeChars = [];
let stageActive = false;
let clickLocked = false;

/* ─────────────────────────────────────────
   TITLE
───────────────────────────────────────── */
function initParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = Math.random() * 30 + '%';
    p.style.animationDuration = (Math.random() * 6 + 4) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
    container.appendChild(p);
  }
}

/* ─────────────────────────────────────────
   TEAM SLOTS
───────────────────────────────────────── */
function renderTeamSlots() {
  const container = document.getElementById('teamDisplay');
  container.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'team-slot' + (i < collectedTeam.length ? ' filled' : '');
    slot.id = 'slot-' + i;
    if (i < collectedTeam.length) {
      const face = document.createElement('div');
      face.className = 'slot-face';
      face.textContent = collectedTeam[i].slotFace;
      face.style.color = collectedTeam[i].slotColor;
      slot.appendChild(face);
    } else {
      const empty = document.createElement('div');
      empty.className = 'slot-empty';
      empty.textContent = '?';
      slot.appendChild(empty);
    }
    container.appendChild(slot);
  }
}

/* ─────────────────────────────────────────
   BUILD CHARACTER SVG-LIKE DIV
───────────────────────────────────────── */
function buildCharacterEl(palette, isTarget, scale) {
  const el = document.createElement('div');
  el.className = 'character' + (isTarget ? ' is-target' : '');

  const body = document.createElement('div');
  body.className = 'char-body';
  body.style.transform = `scale(${scale})`;
  body.style.transformOrigin = 'bottom center';

  // Head
  const head = document.createElement('div');
  head.className = 'char-head';
  head.style.background = palette.headColor || palette.h;
  head.style.boxShadow = isTarget ? 'none' : 'none';

  // Eyes
  const eyes = document.createElement('div');
  eyes.className = 'char-eyes';
  for (let e = 0; e < 2; e++) {
    const eyeEl = document.createElement('div');
    eyeEl.className = 'eye';
    eyeEl.style.background = palette.eyeBase || palette.e;
    const pupil = document.createElement('div');
    pupil.className = 'pupil';
    eyeEl.appendChild(pupil);
    eyes.appendChild(eyeEl);
  }
  head.appendChild(eyes);

  // Torso
  const torso = document.createElement('div');
  torso.className = 'char-torso';
  torso.style.background = palette.torsoColor || palette.t;

  // Legs
  const legs = document.createElement('div');
  legs.className = 'char-legs';
  for (let l = 0; l < 2; l++) {
    const leg = document.createElement('div');
    leg.className = 'char-leg';
    leg.style.background = palette.legColor || palette.l;
    legs.appendChild(leg);
  }

  body.appendChild(head);
  body.appendChild(torso);
  body.appendChild(legs);
  el.appendChild(body);

  return el;
}

/* ─────────────────────────────────────────
   SPAWN CHARACTER
───────────────────────────────────────── */
function spawnCharacter(stage, isTarget) {
  const container = document.getElementById('charContainer');
  const palette = isTarget
    ? stage.target
    : stage.npcPalettes[Math.floor(Math.random() * stage.npcPalettes.length)];

  const scale = 0.7 + Math.random() * 0.5;
  const duration = (7 + Math.random() * 6) * (1 / scale) * 0.7;
  const bottomPos = -10 + Math.random() * 20;
  const delay = 0;

  const el = buildCharacterEl(palette, isTarget, scale);
  el.style.animationDuration = duration + 's';
  el.style.animationDelay = delay + 's';
  el.style.bottom = bottomPos + 'px';

  // Leg speed matches walk speed
  const legEls = el.querySelectorAll('.char-leg');
  legEls.forEach(l => l.style.animationDuration = (0.3 + Math.random() * 0.3) + 's');

  el.addEventListener('click', (e) => handleCharClick(e, el, isTarget, stage));

  container.appendChild(el);
  activeChars.push(el);

  // Remove after animation
  el.addEventListener('animationend', () => {
    el.remove();
    activeChars = activeChars.filter(c => c !== el);
  });

  return el;
}

/* ─────────────────────────────────────────
   CLICK HANDLER
───────────────────────────────────────── */
function handleCharClick(e, el, isTarget, stage) {
  if (!stageActive || clickLocked) return;
  e.stopPropagation();

  if (isTarget) {
    clickLocked = true;
    stageActive = false;

    // Caught animation
    el.classList.add('caught');
    clearInterval(spawnInterval);

    // Show found overlay after short delay
    setTimeout(() => showFoundOverlay(stage), 600);
  } else {
    // Wrong click
    el.classList.add('wrong-click');
    showMissEffect(e.clientX, e.clientY);
    setTimeout(() => el.classList.remove('wrong-click'), 400);
  }
}

function showMissEffect(x, y) {
  const miss = document.createElement('div');
  miss.className = 'miss-text';
  miss.textContent = '..!';
  miss.style.left = x + 'px';
  miss.style.top = y + 'px';
  document.body.appendChild(miss);
  setTimeout(() => miss.remove(), 800);
}

/* ─────────────────────────────────────────
   FOUND OVERLAY
───────────────────────────────────────── */
function showFoundOverlay(stage) {
  const overlay = document.getElementById('foundOverlay');
  const preview = document.getElementById('foundPreview');
  const nameEl = document.getElementById('foundName');
  const roleEl = document.getElementById('foundRole');

  preview.style.background = stage.target.headColor;
  preview.style.boxShadow = `0 0 30px ${stage.target.eyeBase}88, inset 0 0 20px ${stage.target.eyeBase}44`;

  nameEl.textContent = stage.target.name + '  영입!';
  nameEl.style.color = stage.target.eyeBase;
  roleEl.textContent = stage.target.role;

  overlay.classList.add('show');
}

/* ─────────────────────────────────────────
   LOAD STAGE
───────────────────────────────────────── */
function loadStage(idx) {
  const stage = STAGES[idx];
  clickLocked = false;
  stageActive = false;
  activeChars = [];

  // BG
  const bg = document.getElementById('stageBg');
  bg.className = 'stage-bg ' + stage.bgClass;

  // HUD
  document.getElementById('stageLabel').textContent = 'Stage ' + stage.id + ' / 4';
  document.getElementById('stageName').textContent = stage.name;
  document.getElementById('stageHint').textContent = stage.hint;

  // Progress
  document.getElementById('progressFill').style.width = (idx / 4 * 100) + '%';

  // Team slots
  renderTeamSlots();

  // Clear container
  const container = document.getElementById('charContainer');
  container.innerHTML = '';

  // Toast
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = '군중 속에서 당신의 팀원을 찾아 클릭하세요';
  document.getElementById('game-screen').appendChild(toast);
  setTimeout(() => toast.remove(), 4500);

  // Start spawning after a moment
  setTimeout(() => {
    stageActive = true;
    startSpawning(stage);
  }, 1200);
}

function startSpawning(stage) {
  let targetSpawned = false;
  let cycleCount = 0;
  const cycleLength = 4; // spawn target every ~4 NPCs

  function spawnCycle() {
    if (!stageActive && !clickLocked) return;

    cycleCount++;

    const shouldSpawnTarget = !targetSpawned && (
      cycleCount >= cycleLength + Math.floor(Math.random() * 3)
    );

    if (shouldSpawnTarget) {
      targetSpawned = true;
      spawnCharacter(stage, true);
    } else if (!targetSpawned) {
      spawnCharacter(stage, false);
    } else {
      // After target, keep spawning NPCs for atmosphere
      spawnCharacter(stage, false);
    }

    // Reset and re-spawn target after it passes
    const delay = 1200 + Math.random() * 1800;
    spawnInterval = setTimeout(spawnCycle, delay);
  }

  // Initial NPCs first
  for (let i = 0; i < 2; i++) {
    setTimeout(() => spawnCharacter(stage, false), i * 800);
  }
  setTimeout(spawnCycle, 2400);
}

/* ─────────────────────────────────────────
   TRANSITION
───────────────────────────────────────── */
function nextStage() {
  const overlay = document.getElementById('foundOverlay');
  overlay.classList.remove('show');

  // Add to team
  collectedTeam.push(STAGES[currentStage].target);
  currentStage++;

  if (currentStage >= STAGES.length) {
    // ENDING
    setTimeout(showEnding, 500);
  } else {
    clearTimeout(spawnInterval);
    setTimeout(() => loadStage(currentStage), 600);
  }
}

/* ─────────────────────────────────────────
   ENDING
───────────────────────────────────────── */
function showEnding() {
  const gameScreen = document.getElementById('game-screen');
  const endingScreen = document.getElementById('ending-screen');

  gameScreen.classList.add('hidden');

  // Stars
  const starsContainer = document.getElementById('endingStars');
  starsContainer.innerHTML = '';
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = (Math.random() * 3 + 1) + 's';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.opacity = Math.random() * 0.5 + 0.1;
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    starsContainer.appendChild(star);
  }

  // Team final
  const teamFinal = document.getElementById('teamFinal');
  teamFinal.innerHTML = '';
  STAGES.forEach((s, i) => {
    const member = document.createElement('div');
    member.className = 'team-final-member';
    member.innerHTML =
      '<div class="member-avatar" style="background:' + s.target.headColor + '; border-color:' + s.target.eyeBase + '; box-shadow: 0 0 20px ' + s.target.eyeBase + '66;">' +
        '<span style="color:' + s.target.eyeBase + ';">' + s.target.slotFace + '</span>' +
      '</div>' +
      '<span class="member-name-label">' + s.target.name + '</span>';
    teamFinal.appendChild(member);
  });

  // Progress full
  document.getElementById('progressFill').style.width = '100%';

  endingScreen.classList.remove('hidden');
}

/* ─────────────────────────────────────────
   INIT / EVENTS
───────────────────────────────────────── */
function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  currentStage = 0;
  collectedTeam = [];
  loadStage(0);
}

function replayGame() {
  document.getElementById('ending-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  currentStage = 0;
  collectedTeam = [];
  clearTimeout(spawnInterval);
  loadStage(0);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('nextBtn').addEventListener('click', nextStage);
document.getElementById('replayBtn').addEventListener('click', replayGame);

// Init
initParticles();
</script>
